<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicios</title>
  <link rel="stylesheet" href="assets/style.css">

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>

  <aside class="buscador-panel" id="buscador-panel">
    <div class="buscador-contenido">
      <h2>Buscar</h2>

      <div class="buscador-input-wrapper">
        <input type="text" id="filtro-busqueda" placeholder="Escribe para buscar..." autocomplete="off">
        <div class="sugerencias" id="sugerencias"></div>
      </div>

      <div class="filtros-tags" id="filtros-tags"></div>
    </div>
    <button class="buscador-toggle" id="buscador-toggle"></button>
  </aside>

  <main>
    <section class="disclaimer">
      <h2>Aviso importante</h2>
      <p>El contenido puede contener errores. Verificar antes de usar como material oficial.</p>
    </section>

    <section class="ejercicios-destacados" id="ejercicios-destacados"></section>
  </main>

  <script>
    let INDEX_DATA = [];

    async function cargarIndice() {
      try {
        const response = await fetch('index.json');
        INDEX_DATA = await response.json();
        inicializarBuscadorPanel();
        aplicarFiltrosDesdeURL();
      } catch (e) {
        console.error('Error cargando índice:', e);
      }
    }

    window.addEventListener('popstate', () => {
      aplicarFiltrosDesdeURL();
    });

    window.addEventListener('load', restaurarEstadoSidebar);
    window.addEventListener('pageshow', (event) => {
      if (event.persisted) {
        restaurarEstadoSidebar();
      }
    });

    function restaurarEstadoSidebar() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('sidebar') === 'collapsed') {
        document.getElementById('buscador-panel').classList.add('collapsed');
      }
    }

    function inicializarBuscadorPanel() {
      window.filtrosActivos = {};
      window.indiceSugerencia = -1;

      const inputBusqueda = document.getElementById('filtro-busqueda');
      const sugerencias = document.getElementById('sugerencias');

      inputBusqueda.addEventListener('input', (e) => {
        const raw  = e.target.value;
        const texto = raw.toLowerCase().trim();

        if (texto.length < 1) {
          sugerencias.classList.remove('mostrar');
          return;
        }

        // Modo #campo: mostrar todos los valores disponibles de ese campo
        if (raw.startsWith('#')) {
          const query = quitarAcentos(texto.slice(1).trim());
          const camposPosibles = INDEX_DATA.length > 0
            ? Object.keys(INDEX_DATA[0]).filter(k => k !== 'enunciado' && k !== 'archivo')
            : [];

          // Buscar campos cuyo nombre coincida con lo escrito después del #
          const camposCoincidentes = query.length === 0
            ? camposPosibles
            : camposPosibles.filter(c => quitarAcentos(c).includes(query));

          if (camposCoincidentes.length === 0) {
            sugerencias.classList.remove('mostrar');
            return;
          }

          sugerencias.innerHTML = '';
          window.sugerenciasData = [];

          camposCoincidentes.forEach((campo, i) => {

            // Valores únicos de ese campo
            const seen = new Set();
            INDEX_DATA.forEach(ej => {
              expandirValores(ej[campo]).forEach(v => {
                if (v && !seen.has(v)) {
                  seen.add(v);
                  const idx = window.sugerenciasData.length;
                  window.sugerenciasData.push({ campo, valor: String(v) });

                  const div = document.createElement('div');
                  div.className = 'sugerencia-item';
                  div.dataset.index = idx;
                  div.innerHTML = `<span class="campo">${campo}:</span> ${v}`;
                  div.addEventListener('click', () => {
                    agregarFiltro(campo, String(v));
                    inputBusqueda.value = '';
                    sugerencias.classList.remove('mostrar');
                  });
                  sugerencias.appendChild(div);
                }
              });
            });
          });

          window.indiceSugerencia = -1;
          sugerencias.classList.add('mostrar');
          return;
        }

        // Modo normal: buscar por valores y enunciado
        const sugerencias_encontradas = obtenerSugerencias(texto);
        const porEnunciado = buscarPorEnunciado(texto);

        if (sugerencias_encontradas.length === 0 && porEnunciado.length === 0) {
          sugerencias.classList.remove('mostrar');
        } else {
          window.sugerenciasData = sugerencias_encontradas;
          window.indiceSugerencia = -1;
          sugerencias.innerHTML = '';

          sugerencias_encontradas.forEach((s, index) => {
            const div = document.createElement('div');
            div.className = 'sugerencia-item';
            div.dataset.index = index;
            const valorMostrar = s.valorFormateado || s.valor;
            div.innerHTML = `<span class="campo">${s.campo}:</span> ${valorMostrar}`;
            div.addEventListener('click', () => {
              agregarFiltro(s.campo, s.valor);
              inputBusqueda.value = '';
              sugerencias.classList.remove('mostrar');
            });
            sugerencias.appendChild(div);
          });

          if (porEnunciado.length > 0) {
            const sep = document.createElement('div');
            sep.className = 'sugerencia-separador';
            sep.textContent = `${porEnunciado.length} coincidencia${porEnunciado.length > 1 ? 's' : ''} en enunciados`;
            sep.addEventListener('click', () => {
              renderizarResultados(porEnunciado);
              inputBusqueda.value = '';
              sugerencias.classList.remove('mostrar');
            });
            sugerencias.appendChild(sep);
          }

          sugerencias.classList.add('mostrar');
        }
      });

      inputBusqueda.addEventListener('keydown', (e) => {
        const items = sugerencias.querySelectorAll('.sugerencia-item');
        if (!items.length) return;

        if (e.key === 'ArrowDown') {
          e.preventDefault();
          window.indiceSugerencia = Math.min(window.indiceSugerencia + 1, items.length - 1);
          actualizarSeleccionSugerencia(items);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          window.indiceSugerencia = Math.max(window.indiceSugerencia - 1, -1);
          actualizarSeleccionSugerencia(items);
        } else if (e.key === 'Enter') {
          e.preventDefault();
          if (window.indiceSugerencia >= 0 && window.sugerenciasData && window.sugerenciasData[window.indiceSugerencia]) {
            const s = window.sugerenciasData[window.indiceSugerencia];
            agregarFiltro(s.campo, s.valor);
            inputBusqueda.value = '';
            sugerencias.classList.remove('mostrar');
          }
        } else if (e.key === 'Escape') {
          sugerencias.classList.remove('mostrar');
        }
      });

      function actualizarSeleccionSugerencia(items) {
        items.forEach((item, i) => {
          item.style.background = i === window.indiceSugerencia ? 'var(--color-bg-alt)' : '';
        });
        if (window.indiceSugerencia >= 0 && items[window.indiceSugerencia]) {
          items[window.indiceSugerencia].scrollIntoView({ block: 'nearest' });
        }
      }

      inputBusqueda.addEventListener('blur', () => {
        setTimeout(() => sugerencias.classList.remove('mostrar'), 200);
      });

      document.addEventListener('click', (e) => {
        if (!e.target.closest('.buscador-input-wrapper')) {
          sugerencias.classList.remove('mostrar');
        }
      });

      document.getElementById('buscador-toggle').addEventListener('click', () => {
        const panel = document.getElementById('buscador-panel');
        panel.classList.toggle('collapsed');
        actualizarURLSidebar(panel.classList.contains('collapsed'));
      });
    }

    const quitarAcentos = (str) => str.normalize('NFD').replace(/[\u0300-\u036f]/g, '');

    const formatearValor = (valor) => {
      if (Array.isArray(valor)) return valor[0];
      if (typeof valor === 'object' && valor !== null) {
        if (valor.nombre) {
          return valor.modelo ? `${valor.nombre} (${valor.modelo})` : valor.nombre;
        }
        return JSON.stringify(valor);
      }
      return valor;
    };

    const expandirValores = (valor) => {
      if (Array.isArray(valor)) return valor;
      if (valor === null || valor === undefined) return [];
      return [valor];
    };

    function obtenerSugerencias(texto) {
      const textoLower = texto.toLowerCase();
      const textoSinAcentos = quitarAcentos(textoLower);

      const camposPosibles = INDEX_DATA.length > 0
        ? Object.keys(INDEX_DATA[0]).filter(k => k !== 'enunciado' && k !== 'archivo')
        : [];

      let sugerencias = [];

      const getValorCampo = (ej, campo) => {
        if (campo.includes('.')) {
          const [obj, prop] = campo.split('.');
          return ej[obj] ? ej[obj][prop] : null;
        }
        return ej[campo] ?? null;
      };

      const coincideConFiltros = (ej, ignorarCampo) => {
        for (const [campo, valoresFiltro] of Object.entries(window.filtrosActivos || {})) {
          if (campo === ignorarCampo) continue;
          const valorEj = expandirValores(getValorCampo(ej, campo));
          const coincide = [...valoresFiltro].some(vf => valorEj.includes(vf));
          if (!coincide) return false;
        }
        return true;
      };

      const recolectarValores = (ejercicios, campo) => {
        const seen = new Set();
        const resultado = [];
        ejercicios.forEach(ej => {
          const vals = expandirValores(getValorCampo(ej, campo));
          vals.forEach(v => {
            if (v && !seen.has(v)) {
              seen.add(v);
              resultado.push(v);
            }
          });
        });
        return resultado;
      };

      camposPosibles.forEach(campo => {
        const ejerciciosFiltrados = INDEX_DATA.filter(ej => coincideConFiltros(ej, campo));
        const valores = recolectarValores(ejerciciosFiltrados, campo);

        valores.forEach(valor => {
          const valorStr = String(valor);
          const valorSinAcentos = quitarAcentos(valorStr.toLowerCase());
          if (valorSinAcentos.includes(textoSinAcentos)) {
            sugerencias.push({ campo, valor: valorStr, valorFormateado: valorStr });
          }
        });
      });

      return sugerencias.slice(0, 10);
    }

    function agregarFiltro(campo, valor) {
      if (!window.filtrosActivos[campo]) {
        window.filtrosActivos[campo] = new Set();
      }
      window.filtrosActivos[campo].add(valor);
      renderizarTags();
      aplicarFiltrosPanel();
    }

    function quitarFiltro(campo, valor) {
      if (window.filtrosActivos[campo]) {
        window.filtrosActivos[campo].delete(valor);
        if (window.filtrosActivos[campo].size === 0) {
          delete window.filtrosActivos[campo];
        }
      }
      renderizarTags();
      aplicarFiltrosPanel();
    }

    function renderizarTags() {
      const container = document.getElementById('filtros-tags');
      container.innerHTML = '';

      Object.entries(window.filtrosActivos).forEach(([campo, valores]) => {
        valores.forEach(valor => {
          const tag = document.createElement('span');
          tag.className = 'filtro-tag';
          const valorAMostrar = typeof valor === 'object' ? formatearValor(valor) : valor;
          tag.innerHTML = `<span class="campo">${campo}:</span> ${valorAMostrar} <span class="quitar">×</span>`;
          tag.querySelector('.quitar').addEventListener('click', () => quitarFiltro(campo, valor));
          container.appendChild(tag);
        });
      });
    }

    function actualizarURLSidebar(collapsed) {
      const params = new URLSearchParams(window.location.search);
      if (collapsed) {
        params.set('sidebar', 'collapsed');
      } else {
        params.delete('sidebar');
      }
      const nuevaURL = params.toString()
        ? `${window.location.pathname}?${params.toString()}`
        : window.location.pathname;
      window.history.replaceState({}, '', nuevaURL);
    }

    function actualizarURL(filtros) {
      const params = new URLSearchParams();

      Object.entries(filtros).forEach(([campo, valores]) => {
        if (valores instanceof Set && valores.size > 0) {
          params.set(campo, Array.from(valores).join(','));
        }
      });

      const nuevaURL = params.toString()
        ? `${window.location.pathname}?${params.toString()}`
        : window.location.pathname;
      window.history.replaceState({}, '', nuevaURL);
    }

    function aplicarFiltrosPanel() {
      actualizarURL(window.filtrosActivos || {});

      const filtros = window.filtrosActivos || {};
      const tieneFiltros = Object.keys(filtros).length > 0;

      if (!tieneFiltros) {
        renderizarEjerciciosAleatorios();
        return;
      }

      const resultados = INDEX_DATA.filter(ej => {
        // Filtro por campos activos (insensible a mayúsculas y tildes)
        for (const [campo, valoresFiltro] of Object.entries(filtros)) {
          let valorEj;
          if (campo.includes('.')) {
            const [obj, prop] = campo.split('.');
            valorEj = ej[obj] ? ej[obj][prop] : null;
          } else {
            valorEj = ej[campo];
          }
          const valoresEj = expandirValores(valorEj).map(v => quitarAcentos(String(v).toLowerCase()));
          const coincide = [...valoresFiltro].some(vf => valoresEj.includes(quitarAcentos(vf.toLowerCase())));
          if (!coincide) return false;
        }
        return true;
      });

      renderizarResultados(resultados);
    }

    function buscarPorEnunciado(texto) {
      const textNorm = quitarAcentos(texto.toLowerCase());
      return INDEX_DATA.filter(ej => {
        const enunciado = quitarAcentos((ej.enunciado || '').toLowerCase());
        return enunciado.includes(textNorm);
      });
    }

    function aplicarFiltrosDesdeURL() {
      const params = new URLSearchParams(window.location.search);
      const ejercicioId = params.get('ejercicio');

      if (ejercicioId) {
        const ej = INDEX_DATA.find(e => e.id === ejercicioId);
        if (ej) {
          cargarEjercicio(ej);
          return;
        }
      }

      const main = document.querySelector('main');

      if (!document.getElementById('ejercicios-destacados')) {
        main.innerHTML = `
          <section class="disclaimer">
            <h2>Aviso importante</h2>
            <p>El contenido puede contener errores. Verificar antes de usar como material oficial.</p>
          </section>
          <section class="ejercicios-destacados" id="ejercicios-destacados"></section>
        `;
      }

      window.filtrosActivos = {};

      params.forEach((valor, clave) => {
        if (clave === 'ejercicio' || clave === 'sidebar') return;
        valor.split(',').forEach(v => {
          if (!window.filtrosActivos[clave]) {
            window.filtrosActivos[clave] = new Set();
          }
          window.filtrosActivos[clave].add(v);
        });
      });

      renderizarTags();
      aplicarFiltrosPanel();
    }

    function renderizarResultados(ejercicios) {
      const container = document.getElementById('ejercicios-destacados');

      if (ejercicios.length === 0) {
        container.innerHTML = '<p>No se encontraron ejercicios.</p>';
        return;
      }

      container.innerHTML = '';

      ejercicios.forEach(ej => {
        const temaFiltrado = window.filtrosActivos?.tema
          ? [...window.filtrosActivos.tema][0]
          : expandirValores(ej.tema)[0];

        const materia    = expandirValores(ej.materia)[0]       || '';
        const origen     = expandirValores(ej.origen)[0]        || '';
        const nro        = expandirValores(ej.ejercicio_nro)[0] || '';
        const dificultad = expandirValores(ej.dificultad)[0]    || '';

        const meta = [materia, origen, nro ? `Ej. ${nro}` : '', dificultad, temaFiltrado]
          .filter(Boolean)
          .join(' · ');

        const btn = document.createElement('button');
        btn.className = 'tarjeta-ejercicio-link';
        btn.innerHTML = `
          <article class="tarjeta-ejercicio">
            <div class="tarjeta-tema">${meta}</div>
            <div class="tarjeta-enunciado">${ej.enunciado}</div>
          </article>
        `;
        btn.addEventListener('click', () => cargarEjercicio(ej));
        container.appendChild(btn);
      });

      renderMath();
    }

    function cargarEjercicio(ej) {
      const main = document.querySelector('main');

      const params = new URLSearchParams(window.location.search);
      params.set('ejercicio', ej.id);
      window.history.pushState({}, '', `${window.location.pathname}?${params.toString()}`);

      document.body.classList.add('ejercicio-abierto');

      main.innerHTML = `
        <div class="ejercicio-nav">
          <button class="btn-volver">← Volver</button>
        </div>
        <iframe
          class="ejercicio-iframe"
          src="${ej.archivo}"
          title="${ej.tema}"
        ></iframe>
      `;

      main.querySelector('.btn-volver').addEventListener('click', volverALista);

      const iframe = main.querySelector('.ejercicio-iframe');
      iframe.addEventListener('load', () => {
        try {
          const altura = iframe.contentDocument.documentElement.scrollHeight;
          iframe.style.height = altura + 'px';
        } catch(e) {
          iframe.style.height = '2000px';
          console.warn('No se pudo leer el alto del iframe:', e);
        }
      });
    }

    function volverALista() {
      document.body.classList.remove('ejercicio-abierto');
      window.history.back();
    }

    function renderMath() {
      if (!window.MathJax) return;
      requestAnimationFrame(() => {
        MathJax.typesetPromise()
          .catch(err => console.error('MathJax error:', err));
      });
    }

    function renderizarEjerciciosAleatorios() {
      const cantidad = Math.min(3, INDEX_DATA.length);
      const indices = [];
      while (indices.length < cantidad) {
        const idx = Math.floor(Math.random() * INDEX_DATA.length);
        if (!indices.includes(idx)) indices.push(idx);
      }
      renderizarResultados(indices.map(idx => INDEX_DATA[idx]));
    }

    cargarIndice();
  </script>

</body>
</html>
