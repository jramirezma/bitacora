<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicios</title>
  <link rel="stylesheet" href="assets/style.css">
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="assets/analytics.js"></script>
</head>
<body>

  <!-- Panel lateral — solo escritorio -->
  <aside class="buscador-panel" id="buscador-panel"></aside>

  <main>
    <section class="disclaimer">
      <h2>Aviso importante</h2>
      <p>El contenido puede contener errores. Verificar antes de usar como material oficial.</p>
    </section>

    <!-- Filtros sticky — solo móvil -->
    <div class="filtros-mobile" id="filtros-mobile"></div>

    <section class="ejercicios-destacados" id="ejercicios-destacados"></section>
  </main>

  <script src="assets/app.js"></script>
</body>
</html>
